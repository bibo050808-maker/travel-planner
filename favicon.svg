<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="pin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e3f2fd"/>
    </linearGradient>
  </defs>

  <!-- Rounded rect background -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Compass outer ring -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="8"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

  <!-- Compass cardinal points -->
  <polygon points="256,86 278,234 256,256 234,234" fill="white" opacity="0.9"/>
  <polygon points="256,426 234,278 256,256 278,278" fill="white" opacity="0.5"/>
  <polygon points="86,256 234,234 256,256 234,278" fill="white" opacity="0.6"/>
  <polygon points="426,256 278,234 256,256 278,278" fill="white" opacity="0.5"/>

  <!-- Compass needle -->
  <polygon points="256,126 270,256 260,260 256,260 252,260 242,256" fill="#fff"/>
  <polygon points="256,386 242,256 252,252 256,252 260,252 270,256" fill="rgba(255,255,255,0.7)"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="10" fill="white"/>

  <!-- Map pin small accent -->
  <path d="M200 380 C200 360 240 320 256 300 C272 320 312 360 312 380 C312 405 288 425 256 425 C224 425 200 405 200 380 Z" fill="white" opacity="0.15"/>
  <circle cx="256" cy="380" r="16" fill="white" opacity="0.15"/>

  <!-- Small plane trail -->
  <line x1="370" y1="160" x2="390" y2="148" stroke="white" stroke-width="3" opacity="0.4"/>
  <line x1="350" y1="178" x2="380" y2="155" stroke="white" stroke-width="2" opacity="0.25"/>
  <line x1="340" y1="190" x2="365" y2="168" stroke="white" stroke-width="1.5" opacity="0.15"/>

  <!-- Small location dots -->
  <circle cx="160" cy="340" r="4" fill="white" opacity="0.3"/>
  <circle cx="350" cy="140" r="3" fill="white" opacity="0.3"/>
  <circle cx="140" cy="180" r="3" fill="white" opacity="0.2"/>
</svg>