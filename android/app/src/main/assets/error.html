<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>旅伴</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;display:flex;align-items:center;justify-content:center;height:100vh;padding:32px;text-align:center;color:#1a1a2e}
.card{max-width:400px}
.icon{font-size:64px;margin-bottom:16px}
h1{font-size:20px;margin-bottom:8px}
p{font-size:14px;color:#888;margin-bottom:24px;line-height:1.6}
.btn{display:inline-block;padding:12px 32px;background:#4fc3f7;color:white;border:none;border-radius:24px;font-size:16px;cursor:pointer;text-decoration:none}
.btn:hover{background:#1976d2}
</style>
</head>
<body>
<div class="card">
<div class="icon">🌐</div>
<h1>无法连接到网络</h1>
<p>请检查您的网络连接，<br>确保已连接到互联网。</p>
<button class="btn" onclick="location.reload()">重新加载</button>
</div>
</body>
</html>
