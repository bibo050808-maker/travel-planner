name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
    paths:
      - 'android/**'
      - '.github/workflows/build-android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: travel-planner-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Build Release AAB
        run: |
          ./gradlew bundleRelease --no-daemon

      - name: Create keystore from secret
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > ../keystore.jks

      - name: Sign Release AAB
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 \
            -keystore ../keystore.jks \
            -storepass ${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.ANDROID_KEY_PASSWORD }} \
            app/build/outputs/bundle/release/app-release.aab \
            ${{ secrets.ANDROID_KEY_ALIAS }}

      - name: Upload Signed Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: travel-planner-release-signed
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn

      - name: Build Signed APK
        run: |
          ./gradlew assembleRelease --no-daemon

      - name: Sign Release APK
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 \
            -keystore ../keystore.jks \
            -storepass ${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.ANDROID_KEY_PASSWORD }} \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            ${{ secrets.ANDROID_KEY_ALIAS }}

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: travel-planner-signed-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Notify
        if: success()
        run: echo "Android APK/AAB signed and ready for store submission!"
