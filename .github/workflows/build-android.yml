name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
    paths:
      - 'android/**'
      - '.github/workflows/build-android.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Build Debug APK
        working-directory: ./android
        run: gradle assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: travel-planner-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Build Release AAB
        working-directory: ./android
        run: gradle bundleRelease --no-daemon

      - name: Build Release APK
        working-directory: ./android
        run: gradle assembleRelease --no-daemon

      - name: Sign artifacts
        working-directory: ./android
        run: |
          printf "`%s" "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > ../keystore.jks
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 \
            -keystore ../keystore.jks \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            app/build/outputs/bundle/release/app-release.aab \
            "${{ secrets.ANDROID_KEY_ALIAS }}"
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 \
            -keystore ../keystore.jks \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            "${{ secrets.ANDROID_KEY_ALIAS }}"

      - name: Upload Signed Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: travel-planner-release-signed
          path: |
            android/app/build/outputs/bundle/release/*.aab
            android/app/build/outputs/apk/release/*-unsigned.apk
          if-no-files-found: warn

      - name: Notify
        if: success()
        run: echo "Build complete! Signed AAB and APK ready!"
