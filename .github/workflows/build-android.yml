name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
    paths:
      - 'android/**'
      - '.github/workflows/build-android.yml'

env:
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install SDK platform
        working-directory: ./android
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true

      - name: Generate Gradle wrapper
        working-directory: ./android
        run: |
          /home/runner/gradle-installations/installs/gradle-8.5/bin/gradle wrapper --gradle-version 8.5

      - name: Build Debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: travel-planner-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Build Release
        working-directory: ./android
        run: |
          ./gradlew bundleRelease assembleRelease --no-daemon

      - name: Sign artifacts
        working-directory: ./android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > ../keystore.jks
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 \
            -keystore ../keystore.jks \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            app/build/outputs/bundle/release/app-release.aab \
            "${{ secrets.ANDROID_KEY_ALIAS }}"
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 \
            -keystore ../keystore.jks \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            "${{ secrets.ANDROID_KEY_ALIAS }}"

      - name: Upload Signed Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: travel-planner-signed-release
          path: |
            android/app/build/outputs/bundle/release/*.aab
            android/app/build/outputs/apk/release/*-unsigned.apk
          if-no-files-found: warn

      - name: Notify
        if: success()
        run: echo "Build complete! Signed AAB and APK ready!"
