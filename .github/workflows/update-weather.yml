name: Update Weather & Deploy
on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Fetch real weather
        run: node scripts/fetchAmapWeather.js
        env:
          AMAP_KEY: ${{ secrets.AMAP_KEY }}
      - name: Commit weather data
        run: |
          git config user.name "weather-bot"
          git config user.email "weather-bot@travel-planner"
          git add src/engine/weatherData.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update weather [skip ci]"
          git push
      - run: npm run build
      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist